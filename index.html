<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Routine &amp; Product Advisor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <div class="logo-area">
          <svg class="loreal-logo" viewBox="0 0 260 60" xmlns="http://www.w3.org/2000/svg" aria-label="L'Oréal Paris">
            <text x="10" y="46" font-family="'Playfair Display', serif" font-size="48" font-weight="700" fill="currentColor" letter-spacing="-1">L'ORÉAL</text>
          </svg>
          <span class="logo-sub">PARIS</span>
        </div>
        <h1 class="site-title">Smart Routine &amp; Product Advisor</h1>
        <p class="header-tagline">Personalized beauty advice for skin, hair, and makeup.</p>
      </header>

      <div class="top-controls">
        <input
          id="productSearch"
          type="search"
          placeholder="Search products by name, brand, category, or keyword"
          autocomplete="off"
        />
        <button id="rtlToggle" class="rtl-btn" type="button">Switch to RTL</button>
      </div>

      <!-- Category Filter -->
      <div class="search-section">
        <select id="categoryFilter">
          <option value="" selected>All Categories</option>
          <option value="cleanser">Cleansers</option>
          <option value="moisturizer">Moisturizers & Treatments</option>
          <option value="haircare">Haircare</option>
          <option value="makeup">Makeup</option>
          <option value="hair color">Hair Color</option>
          <option value="hair styling">Hair Styling</option>
          <option value="men's grooming">Men's Grooming</option>
          <option value="suncare">Suncare</option>
          <option value="fragrance">Fragrance</option>
        </select>
      </div>

      <!-- Products Grid -->
      <div id="productsContainer" class="products-grid"></div>

      <!-- Selected Products -->
      <div class="selected-products">
        <div class="selected-products-heading">
          <h2>Selected Products</h2>
          <button id="clearSelected" class="clear-btn" type="button">Clear All</button>
        </div>
        <div id="selectedProductsList" class="selected-products-list"></div>
        <button id="generateRoutine" class="generate-btn" type="button">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Routine
        </button>
      </div>

      <!------- Chat Area ------->
      <section class="chatbox">
        <h2>Let's Build Your Routine</h2>
        <div id="chatWindow" class="chat-window"></div>

        <form id="chatForm" class="new-chat-form">
          <label for="userInput" class="visually-hidden">Message</label>
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask me about your routine or skincare…"
            autocomplete="off"
            required
          />
          <button type="submit" id="sendBtn">
            <i class="fa-solid fa-paper-plane"></i> Send
          </button>
        </form>
      </section>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2025 L'Oréal. All rights reserved.</p>
        <nav>
          <!-- These URLs are placeholders -->
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
